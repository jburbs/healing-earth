<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Georgia, serif; background: #faf8f5; color: #333; }
.wrap { display: flex; max-width: 1200px; margin: 0 auto; padding: 20px; gap: 20px; min-height: 100vh; }
.main { flex: 1; }
.sidebar { width: 320px; }
h1 { color: #2d6a4f; margin-bottom: 4px; font-size: 26px; }
.subtitle { color: #888; font-size: 14px; margin-bottom: 16px; }

/* Card */
.card { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 24px; margin-bottom: 16px; }
.card.marked { border-left: 4px solid #2d6a4f; background: #f0f7f2; }
.card-num { font-size: 12px; color: #999; margin-bottom: 4px; }
.card h2 { font-size: 22px; margin-bottom: 6px; }
.card-date { font-size: 13px; color: #888; margin-bottom: 12px; }
.card-summary { font-size: 15px; line-height: 1.7; color: #444; margin-bottom: 16px; background: #f9f7f4; padding: 12px; border-radius: 4px; }
.card-actions { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.read-link { color: #2d6a4f; font-weight: bold; text-decoration: none; font-size: 14px; }
.mark-btn { padding: 8px 16px; border: 2px solid #2d6a4f; background: #fff; color: #2d6a4f; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: bold; }
.mark-btn.active { background: #2d6a4f; color: #fff; }
.desc-row { margin-top: 12px; }
.desc-input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; font-family: Georgia, serif; }

/* Nav */
.nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.nav button { padding: 10px 20px; background: #2d6a4f; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
.nav button:disabled { background: #ccc; cursor: default; }
.nav-info { font-size: 14px; color: #666; }

/* Sidebar */
.side-panel { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
.side-panel h3 { font-size: 16px; margin-bottom: 8px; }
.count { font-size: 13px; color: #888; margin-bottom: 8px; }
.tag-list { max-height: 300px; overflow-y: auto; }
.tag-item { display: flex; justify-content: space-between; align-items: flex-start; padding: 8px 0; border-bottom: 1px solid #eee; }
.tag-title { font-size: 13px; font-weight: bold; }
.tag-desc { font-size: 12px; color: #666; margin-top: 2px; }
.tag-remove { background: none; border: none; color: #c00; cursor: pointer; font-size: 18px; padding: 0 4px; }
.empty { color: #aaa; font-size: 13px; padding: 12px 0; text-align: center; }

/* Export */
.export-btn { width: 100%; padding: 10px; background: #2d6a4f; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: bold; margin-bottom: 8px; }
.export-area { display: none; }
.export-area.visible { display: block; }
.export-area textarea { width: 100%; height: 120px; font-family: monospace; font-size: 12px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 8px; }
.copy-btn { width: 100%; padding: 8px; background: #555; color: #fff; border: none; border-radius: 4px; cursor: pointer; }

@media (max-width: 900px) {
  .wrap { flex-direction: column; }
  .sidebar { width: 100%; }
}
</style>
</head>

var idx = 0;
var tagged = {};

function esc(s) {
  var d = document.createElement("div");
  d.textContent = s || "";
  return d.innerHTML;
}

function render() {
  var p = POSTS[idx];
  var isTagged = tagged.hasOwnProperty(p.folder);
  var desc = isTagged ? (tagged[p.folder].description || "") : "";
  
  var card = document.getElementById("card");
  card.className = "card" + (isTagged ? " marked" : "");
  
  // Build card using DOM, not innerHTML with template literals
  card.innerHTML = "";
  
  var numEl = document.createElement("div");
  numEl.className = "card-num";
  numEl.textContent = "Issue " + (idx + 1) + " of " + POSTS.length;
  card.appendChild(numEl);
  
  var h2 = document.createElement("h2");
  h2.textContent = p.title;
  card.appendChild(h2);
  
  var dateEl = document.createElement("div");
  dateEl.className = "card-date";
  dateEl.textContent = p.date;
  card.appendChild(dateEl);
  
  var sumEl = document.createElement("div");
  sumEl.className = "card-summary";
  sumEl.textContent = p.summary || p.excerpt || "";
  card.appendChild(sumEl);
  
  var actions = document.createElement("div");
  actions.className = "card-actions";
  
  var link = document.createElement("a");
  link.className = "read-link";
  link.href = "posts/" + p.folder + "/index.html";
  link.target = "_blank";
  link.textContent = "Read Full Post \u2192";
  actions.appendChild(link);
  
  var markBtn = document.createElement("button");
  markBtn.className = "mark-btn" + (isTagged ? " active" : "");
  markBtn.textContent = isTagged ? "\u2713 Marked as Aha" : "Mark as Aha Moment";
  markBtn.addEventListener("click", function() { toggleTag(p.folder, p.title); });
  actions.appendChild(markBtn);
  
  card.appendChild(actions);
  
  if (isTagged) {
    var descRow = document.createElement("div");
    descRow.className = "desc-row";
    var input = document.createElement("input");
    input.type = "text";
    input.className = "desc-input";
    input.placeholder = "What shifted in your thinking?";
    input.value = desc;
    input.addEventListener("input", function() {
      if (tagged[p.folder]) tagged[p.folder].description = this.value;
      renderTags();
    });
    descRow.appendChild(input);
    card.appendChild(descRow);
  }
  
  document.getElementById("navInfo").textContent = (idx + 1) + " / " + POSTS.length;
  document.getElementById("prevBtn").disabled = (idx === 0);
  document.getElementById("nextBtn").disabled = (idx === POSTS.length - 1);
}

function toggleTag(folder, title) {
  if (tagged.hasOwnProperty(folder)) {
    delete tagged[folder];
  } else {
    tagged[folder] = { title: title, description: "" };
  }
  render();
  renderTags();
}

function renderTags() {
  var list = document.getElementById("tagList");
  var keys = Object.keys(tagged);
  document.getElementById("tagCount").textContent = keys.length;
  
  if (keys.length === 0) {
    list.innerHTML = '<div class="empty">None yet.</div>';
    return;
  }
  
  list.innerHTML = "";
  for (var i = 0; i < keys.length; i++) {
    (function(folder) {
      var t = tagged[folder];
      var item = document.createElement("div");
      item.className = "tag-item";
      
      var info = document.createElement("div");
      var titleEl = document.createElement("div");
      titleEl.className = "tag-title";
      titleEl.textContent = t.title;
      info.appendChild(titleEl);
      
      if (t.description) {
        var descEl = document.createElement("div");
        descEl.className = "tag-desc";
        descEl.textContent = t.description;
        info.appendChild(descEl);
      }
      
      var removeBtn = document.createElement("button");
      removeBtn.className = "tag-remove";
      removeBtn.textContent = "\u00d7";
      removeBtn.addEventListener("click", function() {
        delete tagged[folder];
        render();
        renderTags();
      });
      
      item.appendChild(info);
      item.appendChild(removeBtn);
      list.appendChild(item);
    })(keys[i]);
  }
}

function generateExport() {
  var keys = Object.keys(tagged);
  var html = "";
  for (var i = 0; i < keys.length; i++) {
    var t = tagged[keys[i]];
    html += '<tr>\n';
    html += '    <td class="aha-link"><a href="posts/' + esc(keys[i]) + '/index.html">' + esc(t.title) + '</a></td>\n';
    html += '    <td class="aha-desc">' + esc(t.description) + '</td>\n';
    html += '</tr>\n';
  }
  document.getElementById("exportText").value = html;
  document.getElementById("exportArea").className = "export-area visible";
}

document.getElementById("prevBtn").addEventListener("click", function() { if (idx > 0) { idx--; render(); } });
document.getElementById("nextBtn").addEventListener("click", function() { if (idx < POSTS.length - 1) { idx++; render(); } });
document.getElementById("exportBtn").addEventListener("click", generateExport);
document.getElementById("copyBtn").addEventListener("click", function() {
  var ta = document.getElementById("exportText");
  ta.select();
  document.execCommand("copy");
  this.textContent = "Copied!";
  var btn = this;
  setTimeout(function() { btn.textContent = "Copy to Clipboard"; }, 2000);
});
document.addEventListener("keydown", function(e) {
  if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
  if (e.key === "ArrowLeft" && idx > 0) { idx--; render(); }
  if (e.key === "ArrowRight" && idx < POSTS.length - 1) { idx++; render(); }
});

render();
renderTags();
</script>
</body>
</html>
